<!doctype html>
<html lang="zh-CN" data-theme="mystic">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d1a" />
    <meta name="description" content="Lumina Tarot · 离线塔罗牌占卜 · 在黑暗中点亮内心微光" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/img/apple-touch-icon-180.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#c9a961" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lumina" />
    <meta name="application-name" content="Lumina Tarot" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Lumina Tarot · 在黑暗中点亮微光</title>

    <script>
      (function () {
        try {
          var t = localStorage.getItem('lumina-theme');
          var m = (location.search || '').match(/[?&]t=(mystic|minimal|nature)/);
          if (m) {
            t = m[1];
            try { localStorage.setItem('lumina-theme', t); } catch (e) {}
          }
          if (t === 'mystic' || t === 'minimal' || t === 'nature') {
            document.documentElement.dataset.theme = t;
            document.querySelector('meta[name="theme-color"]').setAttribute(
              'content',
              t === 'mystic' ? '#0b0d1a' : t === 'minimal' ? '#faf8f4' : '#f4ecd8'
            );
          }

          var cb = localStorage.getItem('lumina-card-back');
          var cm = (location.search || '').match(/[?&]cb=(classic|celestial|sacred|floral|eye)/);
          if (cm) {
            cb = cm[1];
            try { localStorage.setItem('lumina-card-back', cb); } catch (e) {}
          }
          if (cb === 'classic' || cb === 'celestial' || cb === 'sacred' || cb === 'floral' || cb === 'eye') {
            document.documentElement.dataset.cardBack = cb;
          } else {
            document.documentElement.dataset.cardBack = 'classic';
          }

          var ms = localStorage.getItem('lumina-minor-style');
          var mm = (location.search || '').match(/[?&]ms=(symbol|geometric)/);
          if (mm) {
            ms = mm[1];
            try { localStorage.setItem('lumina-minor-style', ms); } catch (e) {}
          }
          document.documentElement.dataset.minorStyle = (ms === 'geometric') ? 'geometric' : 'symbol';
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script>
      (function () {
        var FONT_BUNDLES = {
          mystic:
            'https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap',
          minimal:
            'https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap',
          nature:
            'https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Caveat:wght@400;500;600&display=swap',
        };
        function injectStylesheet(href, blocking) {
          var l = document.createElement('link');
          l.rel = 'stylesheet';
          l.href = href;
          if (!blocking) {
            l.media = 'print';
            l.onload = function () {
              l.media = 'all';
              l.onload = null;
            };
          }
          document.head.appendChild(l);
        }
        var theme = document.documentElement.dataset.theme || 'mystic';
        var primary = FONT_BUNDLES[theme] || FONT_BUNDLES.mystic;
        injectStylesheet(primary, true);
        var idle =
          window.requestIdleCallback ||
          function (cb) {
            return setTimeout(cb, 1200);
          };
        idle(function () {
          Object.keys(FONT_BUNDLES).forEach(function (k) {
            if (k !== theme) injectStylesheet(FONT_BUNDLES[k], false);
          });
        });
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
